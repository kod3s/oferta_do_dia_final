<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏷️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Oferta do Dia — Encontre as melhores promoções dos supermercados perto de você" />
    <title>Oferta do Dia</title>
    <script>
      // Limpa tokens Supabase expirados ANTES do React carregar
      // Isso evita o travamento no carregamento sem precisar limpar manualmente
      try {
        Object.keys(localStorage).forEach(function(key) {
          if (!key.startsWith('sb-')) return;
          try {
            var raw = localStorage.getItem(key);
            if (!raw) return;
            var parsed = JSON.parse(raw);
            // Tenta pegar expires_at direto ou do access_token JWT
            var exp = parsed.expires_at;
            if (!exp && parsed.access_token) {
              var payload = parsed.access_token.split('.')[1];
              exp = JSON.parse(atob(payload)).exp;
            }
            // Remove se expirado (com 60s de margem)
            if (exp && (exp - 60) * 1000 < Date.now()) {
              localStorage.removeItem(key);
            }
          } catch (e) {
            // Token malformado — remove
            localStorage.removeItem(key);
          }
        });
      } catch (e) {
        // Fallback: remove tudo sb-
        try {
          Object.keys(localStorage).forEach(function(key) {
            if (key.startsWith('sb-')) localStorage.removeItem(key);
          });
        } catch (_) {}
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
